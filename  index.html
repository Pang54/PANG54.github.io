<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>庞兔AGC</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-color: #FFFFFF;
            --text-color: #000000;
            --border-color: #CCCCCC;
            --info-color: #666666;

            --w-b1: rgba(102, 178, 255, 0.7);
            --w-b2: rgba(51, 153, 255, 0.6);
            --w-b3: rgba(0, 128, 255, 0.7);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #000000;
                --text-color: #FFFFFF;
                --border-color: #333333;
                --info-color: #999999;

                --w-b1: rgba(77, 166, 255, 0.7);
                --w-b2: rgba(26, 140, 255, 0.6);
                --w-b3: rgba(0, 115, 230, 0.7);
            }
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        .bottom-wave-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
            filter: blur(60px);
            transform: translateZ(0);
        }

        .js-blob {
            position: absolute;
            bottom: -200px;
            left: 0;
            border-radius: 50% 50% 0 0;
            transform-origin: center bottom;
            will-change: transform;
        }

        .chat-container {
            flex: 1;
            min-height: 0;
            box-sizing: border-box;
            padding: 160px 40px 120px 40px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            scroll-behavior: smooth;
            position: relative;
            z-index: 1;
            -webkit-mask-image: linear-gradient(to bottom,
                    transparent 0px,
                    rgba(0, 0, 0, 0.05) 50px,
                    rgba(0, 0, 0, 0.2) 100px,
                    rgba(0, 0, 0, 0.4) 160px,
                    rgba(0, 0, 0, 0.7) 220px,
                    black 280px,

                    black calc(100% - 220px),
                    rgba(0, 0, 0, 0.7) calc(100% - 170px),
                    rgba(0, 0, 0, 0.4) calc(100% - 120px),
                    rgba(0, 0, 0, 0.2) calc(100% - 70px),
                    rgba(0, 0, 0, 0.05) calc(100% - 30px),
                    transparent 100%);
            mask-image: linear-gradient(to bottom,
                    transparent 0px,
                    rgba(0, 0, 0, 0.05) 50px,
                    rgba(0, 0, 0, 0.2) 100px,
                    rgba(0, 0, 0, 0.4) 160px,
                    rgba(0, 0, 0, 0.7) 220px,
                    black 280px,

                    black calc(100% - 220px),
                    rgba(0, 0, 0, 0.7) calc(100% - 170px),
                    rgba(0, 0, 0, 0.4) calc(100% - 120px),
                    rgba(0, 0, 0, 0.2) calc(100% - 70px),
                    rgba(0, 0, 0, 0.05) calc(100% - 30px),
                    transparent 100%);
        }

        .message {
            margin-bottom: 24px;
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-word;
            max-width: 800px;
            font-size: 1rem;
            color: var(--text-color);

            border: 1px solid var(--border-color);
            padding: 16px 20px;
            border-radius: 20px;
        }

        .message.user {
            align-self: flex-end;
            text-align: left;
            border-bottom-right-radius: 4px;
        }

        .message.assistant {
            align-self: flex-start;
            text-align: left;
            border-top-left-radius: 4px;
        }

        .markdown-body {
            white-space: normal;
            line-height: 1.7;
        }

        .markdown-body p {
            white-space: pre-wrap;
        }

        .message.assistant p {
            margin: 0 0 12px 0;
        }

        .message.assistant p:last-child {
            margin-bottom: 0;
        }

        .message.assistant table {
            border-collapse: collapse;
            width: 100%;
            margin: 16px 0;
            font-size: 0.95rem;
            background: transparent;
        }

        .message.assistant th,
        .message.assistant td {
            border: none;
            border-bottom: 1px solid var(--border-color);
            padding: 12px 14px;
            text-align: left;
            background: transparent;
        }

        .message.assistant th {
            font-weight: 600;
            color: var(--text-color);
            border-bottom: 2px solid var(--border-color);
        }

        .message.assistant tr:nth-child(even) {
            background: transparent;
        }

        .message.assistant code {
            background-color: var(--message-bg-user);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', Consolas, monospace;
            font-size: 0.9em;
            color: #d14;
        }

        .message.assistant pre code {
            background-color: transparent;
            padding: 0;
            color: inherit;
        }

        .message.assistant pre {
            background-color: #f6f8fa;
            padding: 16px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 16px 0;
        }

        .message.assistant blockquote {
            border-left: 4px solid var(--info-color);
            margin: 16px 0;
            padding-left: 16px;
            color: #666;
        }

        .message.assistant ul,
        .message.assistant ol {
            margin: 12px 0;
            padding-left: 24px;
        }

        .message.assistant li {
            margin-bottom: 6px;
        }

        .message.assistant.is-typing {
            background: transparent;
            border-color: transparent;
            padding: 16px 0;
            box-shadow: none;
        }

        .input-hit-area {
            flex-shrink: 0;
            padding: 12px 40px 40px 40px;
            touch-action: manipulation;
            width: 100%;
            max-width: 880px;
            margin: 0 auto;
            box-sizing: border-box;
            cursor: text;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1;
        }

        .input-visual-border {
            border-radius: 44px;
            display: flex;
            align-items: flex-end;
            padding: 12px 20px;
            gap: 12px;
            position: relative;
            z-index: 2;
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
        }

        .model-info {
            font-size: 0.85rem;
            color: var(--info-color);
            text-align: center;
            pointer-events: auto;
            user-select: none;

            position: absolute;
            left: 0;
            width: 100%;
            bottom: 40px;
            z-index: 1;
            opacity: 0;
            transform: translateY(-5px);
            transition: opacity 0.4s ease, transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .model-info.show {
            opacity: 1;
            transform: translateY(24px);
        }

        .copyright-link {
            color: inherit;
            text-decoration: none;
            pointer-events: auto;
            cursor: pointer;
            padding: 0 8px;
            font-family: Arial, sans-serif;
            display: inline-block;
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-color);
            font-size: 1rem;
            line-height: 1.5;
            resize: none;
            outline: none;
            padding: 0;
            margin: 0;

            height: 24px !important;
            min-height: 24px !important;
            max-height: 24px !important;

            font-family: inherit;
            cursor: text;
            overflow-y: auto !important;
            box-sizing: border-box;
        }

        textarea::-webkit-scrollbar {
            display: none;
        }

        .send-btn {
            position: relative;
            background: transparent;
            color: var(--text-color);
            border: none;
            cursor: pointer;
            font-size: 1.4rem;
            padding: 0;
            margin-bottom: 0px;
            display: flex;
            align-items: center;
            justify-content: center;
            outline: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            opacity: 0;
            z-index: 10;
            pointer-events: none;
        }

        .send-btn::before {
            content: '';
            position: absolute;
            top: -4px;
            left: -4px;
            right: -4px;
            bottom: -4px;
            border-radius: 50%;
            background: conic-gradient(from 0deg,
                    #2c8cff 0%,
                    #80bfff 15%,
                    #4777d7 30%,
                    #66a3ff 45%,
                    #1a75ff 60%,
                    #99ccff 75%,
                    #3399ff 90%,
                    #2c8cff 100%);
            transition: top 3s ease-in-out,
                left 3s ease-in-out,
                right 3s ease-in-out,
                bottom 3s ease-in-out,
                filter 3s ease-in-out,
                opacity 3s ease-in-out;
            filter: blur(3px);
            opacity: 0.8;
            animation: btnCloudAura 4s linear infinite;
            z-index: -2;
        }

        .send-btn:hover::before {
            top: -14px;
            left: -14px;
            right: -14px;
            bottom: -14px;
            filter: blur(10px);
            opacity: 1;
        }


        .send-btn::after {
            content: '';
            position: absolute;
            top: 0px;
            left: 0px;
            right: 0px;
            bottom: 0px;
            border-radius: 50%;
            background: transparent;
            z-index: -1;
        }


        @keyframes btnCloudAura {
            0% {
                transform: rotate(0deg) scale(0.95);
                border-radius: 48% 52% 50% 50% / 50% 50% 48% 52%;
            }

            50% {
                transform: rotate(180deg) scale(1.03);
                border-radius: 52% 48% 50% 50% / 48% 52% 50% 50%;
            }

            100% {
                transform: rotate(360deg) scale(0.95);
                border-radius: 48% 52% 50% 50% / 50% 50% 48% 52%;
            }
        }

        .loading-spinner {
            width: 14px;
            height: 14px;
            border: 2px solid var(--text-color);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .message.assistant.is-searching {
            background: transparent;
            border-color: transparent;
            box-shadow: none;
            padding: 4px 0;
            margin: 0;
            min-width: 0;
        }

        .search-indicator {
            display: flex;
            flex-direction: column;
            gap: 2px;
            font-size: 0.8rem;
            font-weight: 500;
            background: linear-gradient(90deg, var(--info-color) 0%, var(--w-b1) 50%, var(--info-color) 100%);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: sweep 2s linear infinite;
            line-height: 1.4;
        }

        .search-stats {
            font-size: 0.7rem;
            opacity: 0.6;
            font-family: 'JetBrains Mono', Consolas, monospace;
            letter-spacing: 0.5px;
        }

        @keyframes sweep {
            0% {
                background-position: 100% 0;
            }

            100% {
                background-position: -100% 0;
            }
        }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-color);
            animation: blink 1s step-end infinite;
            vertical-align: middle;
            margin-left: 4px;
        }

        .dot-typing {
            display: inline-flex;
            gap: 4px;
            align-items: center;
            height: 1.5em;
            vertical-align: middle;
        }

        .dot-typing::before,
        .dot-typing::after,
        .dot-typing span {
            content: '';
            display: block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: var(--text-color);
            animation: blinkFade 1.4s infinite both;
        }

        .dot-typing span {
            animation-delay: 0.2s;
        }

        .dot-typing::after {
            animation-delay: 0.4s;
        }

        @keyframes blinkFade {

            0%,
            100% {
                opacity: 0.2;
            }

            20% {
                opacity: 1;
            }
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        ::-webkit-scrollbar {
            display: none;
        }

        @media (max-width: 768px) {

            .chat-container,
            .input-hit-area {
                padding-left: 20px;
                padding-right: 20px;
            }
        }

        .mic-btn {
            background: transparent;
            border: none;
            color: var(--info-color);
            width: 24px;
            height: 24px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            margin-right: 4px;
            flex-shrink: 0;
            align-self: center;
            margin-bottom: 0px;
            padding: 0;
        }

        .mic-btn svg {
            transform: translateY(1px);
        }

        .mic-btn:hover {
            color: var(--text-color);
        }

        .mic-btn.active {
            color: #ff3366;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.15);
            }

            100% {
                transform: scale(1);
            }
        }

        .user-wave-canvas {
            flex: 1;
            height: 24px;
            display: none;
            align-self: center;
            min-width: 0;
        }

        .is-listening textarea {
            display: none !important;
        }

        .is-listening .user-wave-canvas {
            display: block !important;
        }

        .is-listening .send-btn {
            display: none !important;
        }

        .greeting-container {
            position: absolute;
            top: 45%;

            left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw;
            text-align: center;
            pointer-events: auto;
            z-index: 0;
        }

        .greeting-container h1 {
            font-size: 2.2rem;
            font-weight: 600;
            color: var(--text-color);
            margin: 0;
            padding: 0 20px;
        }

        .greeting-container h1 {
            background: linear-gradient(135deg, var(--text-color) 0%, rgba(128, 128, 128, 0.5) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0;
            animation: fadeUp 0.6s ease-out forwards;
        }

        @keyframes fadeUp {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .greeting-container.hide {
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            opacity: 0;
            transform: translate(-50%, -50%) translateY(-30px);
            pointer-events: none;
        }


    </style>
</head>

<body>

    <div class="bottom-wave-container" id="bottomWave">
        <div class="js-blob" id="blob1"></div>
        <div class="js-blob" id="blob2"></div>
        <div class="js-blob" id="blob3"></div>
        <div class="js-blob" id="blob4"></div>
        <div class="js-blob" id="blob5"></div>
    </div>

    <div class="greeting-container" id="greetingContainer">
        <h1 id="greetingText"></h1>
    </div>


    <div class="chat-container" id="chatHistory"></div>

    <div class="input-hit-area" id="inputHitArea">
        <div class="input-visual-border">
            <button id="micBtn" class="mic-btn" title="语音对话">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                    <path
                        d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 0-.9.36-.98.85C16.52 14.2 14.47 16 12 16s-4.52-1.8-4.93-4.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14.49 3 2.89 5.35 5.91 5.78V20c0 .55.45 1 1 1s1-.45 1-1v-2.08c3.02-.43 5.42-2.78 5.91-5.78.1-.6-.39-1.14-1-1.14z" />
                </svg>
            </button>
            <textarea id="messageInput"></textarea>
            <canvas id="userWaveCanvas" class="user-wave-canvas" height="24"></canvas>
            <button id="sendBtn" class="send-btn">↑</button>
        </div>
        <div class="model-info" id="modelInfo">庞兔 intelligence 5.4 codex</div>
        <div class="model-info" id="copyrightInfo">本网站由庞疆博搭建<a href="https://www.ncac.gov.cn/" target="_blank"
                class="copyright-link">©</a></div>
    </div>

    <script>
        const API_URL = 'https://skxdarjmy4.sealosbja.site/PANGJIANGBO';
        let API_MODEL = 'deepseek-reasoner';

        const TAVILY_API_KEY = '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';

        let chatHistory = [];
        let isGenerating = false;
        window.currentStreamController = null;

        const elements = {
            greetingContainer: document.getElementById('greetingContainer'),
            chatHistory: document.getElementById('chatHistory'),
            inputHitArea: document.getElementById('inputHitArea'),
            inputVisualBorder: document.querySelector('.input-visual-border'),
            messageInput: document.getElementById('messageInput'),
            sendBtn: document.getElementById('sendBtn'),
            modelInfo: document.getElementById('modelInfo'),
            copyrightInfo: document.getElementById('copyrightInfo')
        };

        function updateGlassState() {
            const isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;

            if (isDark) {
                elements.inputVisualBorder.style.background = `rgba(20, 20, 22, 0.75)`;
                elements.inputVisualBorder.style.border = `1px solid rgba(255, 255, 255, 0.2)`;
                elements.inputVisualBorder.style.boxShadow = `inset 0 1px 1px rgba(255, 255, 255, 0.1), 0 8px 32px rgba(0, 0, 0, 0.5)`;
            } else {
                elements.inputVisualBorder.style.background = `rgba(255, 255, 255, 0.8)`;
                elements.inputVisualBorder.style.border = `1px solid rgba(255, 255, 255, 0.8)`;
                elements.inputVisualBorder.style.boxShadow = `inset 0 1px 1px rgba(255, 255, 255, 0.8), 0 8px 32px rgba(0, 0, 0, 0.1)`;
            }
        }

        updateGlassState();

        if (window.matchMedia) {
            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
                updateGlassState();
            });
        }


        let btnAnimationId = null;
        let currentBtnOpacity = 0;
        let targetBtnOpacity = 0;

        function updateBtnState(visible) {
            const target = visible ? 1 : 0;
            if (targetBtnOpacity === target) return;
            targetBtnOpacity = target;

            if (btnAnimationId) cancelAnimationFrame(btnAnimationId);

            const startOpacity = currentBtnOpacity;
            const startTime = performance.now();
            const duration = 3000; // 绝对的 3 秒匀速时间线

            function step(currentTime) {
                const elapsed = currentTime - startTime;
                let progress = elapsed / duration;
                if (progress > 1) progress = 1;

                currentBtnOpacity = startOpacity + (target - startOpacity) * progress;
                elements.sendBtn.style.opacity = currentBtnOpacity;

                elements.sendBtn.style.pointerEvents = currentBtnOpacity > 0.05 ? 'auto' : 'none';

                if (progress < 1) {
                    btnAnimationId = requestAnimationFrame(step);
                }
            }
            btnAnimationId = requestAnimationFrame(step);
        }

        const blobsConfig = [
            { id: 'blob1', colorVar: '--w-b1', width: 120, baseHeight: 380 },
            { id: 'blob2', colorVar: '--w-b2', width: 130, baseHeight: 420 },
            { id: 'blob3', colorVar: '--w-b3', width: 125, baseHeight: 400 },
            { id: 'blob4', colorVar: '--w-b1', width: 135, baseHeight: 390 },
            { id: 'blob5', colorVar: '--w-b2', width: 125, baseHeight: 430 }
        ];

        let cloudState = 'idle'; // 打字或生成状态依然走这个逻辑

        const blobStates = blobsConfig.map((b, index) => {
            let regions = [-20, 15, 50, 85, 120];
            return {
                el: document.getElementById(b.id),
                baseX: regions[index],
                width: b.width,
                baseHeight: b.baseHeight,
                colorVar: b.colorVar,

                freqX1: 0.3 + Math.random() * 0.3,
                freqX2: 0.4 + Math.random() * 0.3,
                phaseX1: Math.random() * Math.PI * 2,
                phaseX2: Math.random() * Math.PI * 2,

                freqH1: 0.3 + Math.random() * 0.3,
                freqH2: 0.4 + Math.random() * 0.3,
                phaseH1: Math.random() * Math.PI * 2,
                phaseH2: Math.random() * Math.PI * 2,

                surgeMult: 0.8 + Math.random() * 0.5, // 让每朵云无规律涨幅 (0.8~1.3倍)

                currentAmpMult: 0,
                audioSpike: 0, // 音频突变激荡高度
                audioSpikeVel: 0 // 音波弹簧速度
            };
        });

        blobStates.forEach(b => {
            b.el.style.width = b.width + 'vw';
            b.el.style.height = b.baseHeight + 'px';
            b.el.style.background = `var(${b.colorVar})`;
        });

        let cloudSurgeY = 0;
        let cloudSurgeVel = 0;
        let cloudSurgeTarget = window.innerHeight * 0.45; // 绝对大于 40%
        let surgePhase = 'up';

        let cloudTime = 0;
        let lastTime = performance.now();

        function updateCloud(currentTime) {
            let dt = (currentTime - lastTime) / 1000;
            

            lastTime = currentTime;
            if (dt > 0.05) dt = 0.016; // 限制最大 dt 防止跳帧爆炸

            if (surgePhase === 'up') {
                const force = -120 * (cloudSurgeY - cloudSurgeTarget) - 14 * cloudSurgeVel;
                cloudSurgeVel += force * dt;
                cloudSurgeY += cloudSurgeVel * dt;

                if (cloudSurgeY > cloudSurgeTarget * 0.95 && cloudSurgeVel < 50) {
                    surgePhase = 'down';
                    cloudSurgeTarget = 0; // 目标恢复至 0（正常状态）
                }
            } else if (surgePhase === 'down') {
                const force = -40 * (cloudSurgeY - cloudSurgeTarget) - 10 * cloudSurgeVel;
                cloudSurgeVel += force * dt;
                cloudSurgeY += cloudSurgeVel * dt;

                if (Math.abs(cloudSurgeY) < 1 && Math.abs(cloudSurgeVel) < 1) {
                    surgePhase = 'done';
                    cloudSurgeY = 0;
                }
            }

            let targetSpeedMult = 0.4;
            let targetAmpMult = 0.7;

            if (cloudState === 'typing') {
                targetSpeedMult = 0.6;
                targetAmpMult = 0.9;
            } else if (cloudState === 'generating') {
                targetSpeedMult = 1.8;
                targetAmpMult = 1.4;
            }

            cloudTime += dt * targetSpeedMult;

            blobStates.forEach((b) => {
                b.currentAmpMult += (targetAmpMult - b.currentAmpMult) * 0.03;

                let xOffset = Math.sin(cloudTime * b.freqX1 + b.phaseX1) * 15
                    + Math.sin(cloudTime * b.freqX2 + b.phaseX2) * 10;
                let x = b.baseX + xOffset;

                let hWave = Math.sin(cloudTime * b.freqH1 + b.phaseH1) * 30
                    + Math.sin(cloudTime * b.freqH2 + b.phaseH2) * 20;

                let springForce = -0.06 * b.audioSpike;
                let dampForce = -0.15 * b.audioSpikeVel;
                b.audioSpikeVel += springForce + dampForce;
                b.audioSpike += b.audioSpikeVel;

                let audioBoost = b.audioSpike / b.baseHeight;
                let surgeBoost = (cloudSurgeY * b.surgeMult) / b.baseHeight;
                let scaleY = b.currentAmpMult + (hWave * b.currentAmpMult) / b.baseHeight + surgeBoost + audioBoost;

                scaleY = Math.max(0.01, scaleY);

                b.el.style.transform = `translate3d(calc(${x}vw - 50%), 0, 0) scaleY(${scaleY})`;
            });

            requestAnimationFrame(updateCloud);

            playSiriSound(type) {
                const Ctx = window.AudioContext || window.webkitAudioContext;
                if (!window.sysAudioCtx) window.sysAudioCtx = new Ctx();
                const ctx = window.sysAudioCtx;
                if (ctx.state === 'suspended') ctx.resume();

                const now = ctx.currentTime;

                if (type === 'start') {
                    const freqs = [523.25, 659.25, 783.99, 987.77];
                    freqs.forEach((freq, i) => {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();

                        osc.type = 'sine'; // 纯净的正弦波
                        osc.frequency.value = freq;

                        gain.gain.setValueAtTime(0, now);
                        gain.gain.linearRampToValueAtTime(0.08, now + 0.05 + (i * 0.02));
                        gain.gain.exponentialRampToValueAtTime(0.001, now + 1.2);

                        osc.connect(gain);
                        gain.connect(ctx.destination);

                        osc.start(now);
                        osc.stop(now + 1.5);
                    });
                } else if (type === 'stop') {
                    const freqs = [987.77, 783.99, 523.25];
                    freqs.forEach((freq, i) => {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();

                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(freq, now);
                        osc.frequency.exponentialRampToValueAtTime(freq * 0.95, now + 0.4);

                        gain.gain.setValueAtTime(0, now);
                        gain.gain.linearRampToValueAtTime(0.06, now + 0.02);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);

                        osc.connect(gain);
                        gain.connect(ctx.destination);

                        osc.start(now);
                        osc.stop(now + 0.5);
                    });
                } else if (type === 'interrupt') {
                    const freqs = [1046.50, 1318.51]; // C6, E6
                    freqs.forEach((freq, i) => {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.type = 'sine';
                        osc.frequency.value = freq;

                        gain.gain.setValueAtTime(0, now + i * 0.08);
                        gain.gain.linearRampToValueAtTime(0.06, now + i * 0.08 + 0.02);
                        gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.08 + 0.8);

                        osc.connect(gain);
                        gain.connect(ctx.destination);
                        osc.start(now + i * 0.08);
                        osc.stop(now + i * 0.08 + 1.0);

            drawUserWave() {
                if (!this.active) return;
                requestAnimationFrame(() => this.drawUserWave());

                if (!this.analyser) {
                    this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                    return;
                }

                const dataArray = new Uint8Array(this.analyser.frequencyBinCount);
                this.analyser.getByteFrequencyData(dataArray);

                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

                const centerY = this.canvas.height / 2;
                const isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
                this.ctx.fillStyle = isDark ? 'rgba(255,255,255,0.8)' : 'rgba(0,0,0,0.8)';

                const numBars = 70;
                const barWidth = 2;
                const gap = (this.canvas.width - (numBars * barWidth)) / Math.max(1, (numBars - 1));

                for (let i = 0; i < numBars; i++) {
                    const dataIndex = Math.floor(i * (dataArray.length * 0.5) / numBars); // focus on low-mid freq
                    const val = dataArray[dataIndex] / 255;
                    const barHeight = Math.max(4, val * this.canvas.height * 0.9);

                    const x = i * (barWidth + gap);
                    const y = centerY - barHeight / 2;

                    this.ctx.beginPath();
                    this.ctx.roundRect(x, y, barWidth, barHeight, barWidth / 2);
                    this.ctx.fill();
                }

                this.sentenceBuffer += deltaText;

            speakChunk(text) {
                if (!this.active || this.muted) return;
                let clean = text.replace(/```[\s\S]*?```/g, "代码请看屏幕。").replace(/[*#]/g, "");

                clean = clean.replace(/[\u{1F600}-\u{1F64F}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{1F700}-\u{1F77F}\u{1F780}-\u{1F7FF}\u{1F800}-\u{1F8FF}\u{1F900}-\u{1F9FF}\u{1FA00}-\u{1FA6F}\u{1FA70}-\u{1FAFF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu, '');

                if (!clean.trim()) return;

                const u = new SpeechSynthesisUtterance(clean);
                u.lang = 'zh-CN';
                u.pitch = 0.85; // 压低音调，使其没那么尖锐
                u.rate = 1.05;

                const preferredVoice = voices.find(v => v.lang === 'zh-CN' && (v.name.includes('Yunjian') || v.name.includes('Yunxi') || v.name.includes('Xiaoxiao')));
                if (preferredVoice) u.voice = preferredVoice;

                u.onboundary = (e) => {

                        blobStates.forEach(b => {
                            b.audioSpikeVel += 10 + Math.random() * 20;
                        });

                };

                this.synth.speak(u);

            }
            try {
                const res = await fetch('https://api.tavily.com/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        api_key: TAVILY_API_KEY,
                        query: query,
                        search_depth: "basic",
                        max_results: 3
                    })
                });
                const data = await res.json();
                if (data.results && data.results.length > 0) {
                    return data.results.map(r => `标题: ${r.title}\n正文: ${r.content}`).join('\n\n---\n\n');
                }
                return "检索完毕，全网没有找到相关结果。";
            } catch (e) {

        async function fetchDeepSeekStream(aiMessageEl, messagesForAPI, allowToolUse = true, onDelta = null) {
            if (window.currentStreamController) {
                window.currentStreamController.abort();
            }
            window.currentStreamController = new AbortController();

            let apiMessages = messagesForAPI;

            let requestBody = {
                model: API_MODEL,
                messages: apiMessages,
                stream: true,
                tools: [{
                    type: "function",
                    function: {
                        name: "search_web",
                        description: "全网搜索引擎。务必静默调用，严禁在调用前后输出任何解释性废话。",
                        parameters: {
                            type: "object",
                            properties: {
                                query: {
                                    type: "string",
                                    description: "搜索关键词"
                                }
                            },
                            required: ["query"]
                        }
                    }
                }]
            };

            if (!allowToolUse) {
                requestBody.tool_choice = "none";
            }

            let response;
            try {
                response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestBody),
                    signal: window.currentStreamController.signal
                });
            } catch (err) {
                if (err.name === 'AbortError') return { content: "", isToolCall: false };
                throw err;
            }

            if (!response.ok) throw new Error(`${response.status}`);

            const reader = response.body.getReader();
            const decoder = new TextDecoder('utf-8');
            let buffer = '';

            let aiFullContent = '';
            let isFirstChunk = true;

            let toolCalls = [];

            try {
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    let lines = buffer.split('\n');
                    buffer = lines.pop();

                    for (const line of lines) {
                        const trimmed = line.trim();
                        if (!trimmed || !trimmed.startsWith('data: ')) continue;

                        const dataStr = trimmed.slice(6);
                        if (dataStr === '[DONE]') continue;

                        try {
                            const data = JSON.parse(dataStr);
                            const delta = data.choices[0].delta;

                            if (delta.tool_calls && delta.tool_calls.length > 0) {
                                for (const tc of delta.tool_calls) {
                                    const index = tc.index;
                                    if (!toolCalls[index]) toolCalls[index] = { id: '', name: '', args: '' };
                                    if (tc.id) toolCalls[index].id = tc.id;
                                    if (tc.function.name) toolCalls[index].name += tc.function.name;
                                    if (tc.function.arguments) toolCalls[index].args += tc.function.arguments;
                                }
                                continue;
                            }

                            if (delta.content) {
                                const isNearBottom = elements.chatHistory.scrollHeight - elements.chatHistory.scrollTop - elements.chatHistory.clientHeight < 50;

                                if (isFirstChunk) {
                                    isFirstChunk = false;
                                    aiMessageEl.classList.remove('is-typing');
                                    aiMessageEl.innerHTML = '';
                                }

                                if (onDelta) onDelta(delta.content);

                                aiFullContent += delta.content;

                                let displayContent = aiFullContent;
                                const dsmlIndex = displayContent.indexOf('<｜｜DSML');
                                if (dsmlIndex !== -1) {
                                    displayContent = displayContent.substring(0, dsmlIndex);
                                }

                                aiMessageEl.innerHTML = renderMarkdown(displayContent, true);

                                if (isNearBottom) {
                                    elements.chatHistory.scrollTop = elements.chatHistory.scrollHeight;
                                }
                            }
                        } catch (e) { }
                    }
                }
            } catch (err) {
                if (err.name !== 'AbortError') throw err;
            }

            if (toolCalls.length === 0 && aiFullContent.includes('<｜｜DSML｜｜tool_calls>')) {
                const invokeRegex = /<｜｜DSML｜｜invoke name="([^"]+)">[\s\S]*?<｜｜DSML｜｜parameter name="([^"]+)"[^>]*>([\s\S]*?)<\/｜｜DSML｜｜parameter>[\s\S]*?<\/｜｜DSML｜｜invoke>/g;
                let match;
                let idx = 0;
                while ((match = invokeRegex.exec(aiFullContent)) !== null) {
                    toolCalls[idx] = {
                        id: "call_" + Math.random().toString(36).substr(2, 9),
                        name: match[1],
                        args: JSON.stringify({ [match[2]]: match[3].trim() })
                    };
                    idx++;
                }

                if (toolCalls.length === 0) {
                    const nameMatch = aiFullContent.match(/<｜｜DSML｜｜invoke name="([^"]+)"/);
                    if (nameMatch) {
                        const argMatch = aiFullContent.match(/<｜｜DSML｜｜parameter name="([^"]+)"[^>]*>([\s\S]*?)<\/｜｜DSML｜｜parameter>/);
                        if (argMatch) {
                            toolCalls[0] = {
                                id: "call_" + Math.random().toString(36).substr(2, 9),
                                name: nameMatch[1],
                                args: JSON.stringify({ [argMatch[1]]: argMatch[2].trim() })
                            };
                        }
                    }
                }

                const dsmlIndex = aiFullContent.indexOf('<｜｜DSML');
                if (dsmlIndex !== -1) {
                    aiFullContent = aiFullContent.substring(0, dsmlIndex);
                }
            }

            toolCalls = toolCalls.filter(Boolean);

            return {
                content: aiFullContent,
                isToolCall: toolCalls.length > 0,
                toolCalls: toolCalls
            };
        }

        async function sendMessage(customText = null) {
            const text = customText !== null ? customText : elements.messageInput.value.trim();
            if (!text || isGenerating) return;

            const greetingContainer = document.getElementById('greetingContainer');
            if (greetingContainer && !greetingContainer.classList.contains('hide')) {
                greetingContainer.classList.add('hide');
            }

            createMessageElement('user', text);
            chatHistory.push({ role: 'user', content: text });
            if (customText === null) {
                elements.messageInput.value = '';
                updateBtnState(false);
            }

            setLoading(true);

            const aiMessageEl = createMessageElement('assistant', '');
            aiMessageEl.classList.add('is-typing');
            aiMessageEl.innerHTML = '<span class="dot-typing"><span></span></span>';

            try {
                let currentTurn = 0;
                let maxTurns = 5;
                let result;

                while (currentTurn < maxTurns) {
                    currentTurn++;
                    let allowToolUse = (currentTurn < maxTurns);

                    result = await fetchDeepSeekStream(aiMessageEl, chatHistory, allowToolUse, (deltaText) => {
                        if (window.VoiceManager && window.VoiceManager.active) window.VoiceManager.onDeltaStream(deltaText);
                    });

                    if (result.isToolCall && result.toolCalls && result.toolCalls.length > 0) {
                        aiMessageEl.classList.remove('is-typing');
                        aiMessageEl.classList.add('is-searching');

                        let queries = [];
                        let apiToolCalls = [];

                        for (let tc of result.toolCalls) {
                            let args = {};
                            try { args = JSON.parse(tc.args); } catch (e) { }
                            let query = args.query || text;
                            queries.push(query);

                            apiToolCalls.push({
                                id: tc.id || "call_" + Math.random().toString(36).substr(2, 9),
                                type: "function",
                                function: { name: tc.name || "search_web", arguments: tc.args }
                            });
                        }

                        aiMessageEl.innerHTML = `
                            <div class="search-indicator">
                                <div class="search-title">庞兔正在偷看浏览器...</div>
                                <div class="search-stats" id="searchStats">已阅读 0 篇参考 · 获取 0 篇深度资料</div>
                            </div>
                        `;
                        elements.chatHistory.scrollTop = elements.chatHistory.scrollHeight;

                        let readCount = 0;
                        let refCount = 0;
                        let searchInterval = setInterval(() => {
                            readCount += Math.floor(Math.random() * 8) + 3;
                            refCount = Math.floor(readCount * 0.35);
                            const statsEl = document.getElementById('searchStats');
                            if (statsEl) {
                                statsEl.innerText = `已阅读 ${readCount} 篇参考 · 获取 ${refCount} 篇深度资料`;
                            }
                        }, 120);

                        chatHistory.push({
                            role: "assistant",
                            content: result.content || "",
                            tool_calls: apiToolCalls
                        });

                        const searchPromises = queries.map(q => searchTavily(q));
                        const searchResults = await Promise.all(searchPromises);

                        for (let i = 0; i < apiToolCalls.length; i++) {
                            chatHistory.push({
                                role: "tool",
                                tool_call_id: apiToolCalls[i].id,
                                name: apiToolCalls[i].function.name,
                                content: searchResults[i]
                            });
                        }

                        clearInterval(searchInterval);
                        aiMessageEl.classList.remove('is-searching');
                        aiMessageEl.classList.add('is-typing');
                        aiMessageEl.innerHTML = '<span class="dot-typing"><span></span></span>';
                    } else {
                        aiMessageEl.classList.remove('is-typing');
                        if (!result.content) {
                            result.content = "（系统提示：大模型本次未能生成文字，这可能是暂时的网络或逻辑波动，请您重新提问。）";
                        }
                        aiMessageEl.innerHTML = renderMarkdown(result.content);
                        chatHistory.push({ role: 'assistant', content: result.content });
                        break;
                    }
                }
            } catch (error) {
                aiMessageEl.innerHTML += `<br>[错误: ${error.message}]`;
            } finally {
                setLoading(false);
            }
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, tag => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                "'": '&#39;',
                '"': '&quot;'
            }[tag] || tag));
        }

        function renderMarkdown(str, appendCursor = false) {
            const cursorHtml = appendCursor ? '<span class="cursor"></span>' : '';
            if (window.marked) {
                try {
                    let processStr = str;
                    if (appendCursor) processStr += ' ▌CURSOR_TOKEN▌';

                    let parsed = marked.parse(processStr, { breaks: true });
                    if (appendCursor) parsed = parsed.replace(' ▌CURSOR_TOKEN▌', cursorHtml);

                    return `<div class="markdown-body">${parsed}</div>`;
                } catch (e) {
                    return escapeHTML(str) + cursorHtml;
                }
            }
            return escapeHTML(str) + cursorHtml;
        }

        function createMessageElement(role, initialContent = '') {
            const msg = document.createElement('div');
            msg.className = `message ${role}`;
            msg.textContent = initialContent;
            elements.chatHistory.appendChild(msg);
            elements.chatHistory.scrollTop = elements.chatHistory.scrollHeight;
            return msg;
        }

        function setLoading(loading) {
            isGenerating = loading;
            if (loading) {
                elements.sendBtn.innerHTML = '<div class="loading-spinner"></div>';
                updateBtnState(true);
                cloudState = 'generating';
            } else {
                elements.sendBtn.innerHTML = '↑';
                updateBtnState(elements.messageInput.value.trim().length > 0);

                if (document.activeElement === elements.messageInput) {
                    cloudState = 'typing';
                } else {
                    cloudState = 'idle';
                }
            }
        }

        elements.sendBtn.addEventListener('click', (e) => {
            if (isLongPress) {
                isLongPress = false;
                return;
            }
            sendMessage();
        });

        elements.messageInput.addEventListener('input', () => {
            updateBtnState(elements.messageInput.value.trim().length > 0);
        });

        elements.messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
